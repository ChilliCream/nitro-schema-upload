name: "Nitro Schema Upload"
description: "Uploads GraphQL schemas to the Nitro registry"
author: "ChilliCream"
branding:
  icon: "upload-cloud"
  color: "blue"

inputs:
  tag:
    description: "The tag of the schema version"
    required: true
  schema-file:
    description: "The path to the graphql file with the schema definition"
    required: true
  api-id:
    description: "The ID of the API"
    required: true
  api-key:
    description: "API key for authentication"
    required: true
    secret: true
  cloud-url:
    description: "The URL of the Nitro registry"
    required: false
  job-id:
    description: "The ID of the current job"
    required: false
    default: ${{ job.check_run_id }}

runs:
  using: "node20"
  main: "dist/index.js"
